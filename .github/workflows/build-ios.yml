name: Build iOS

on:
  workflow_call:
    inputs:
      deployment-target:
        required: true
        type: string

env:
  CMAKE_VERSION: '3.31.6'
  XCODE_VERSION: '16.4'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-cmake
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select --switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Generate iOS solution
        run: |
          cmake -G Xcode -B build/iOS \
            -D IOS=ON \
            -D DEPLOYMENT_TARGET=${{ inputs.deployment-target }} \
            -D BABYLON_DEBUG_TRACE=ON \
            -D CMAKE_IOS_INSTALL_COMBINED=NO

      - name: Build Playground iOS
        run: |
          xcodebuild \
            -project build/iOS/BabylonNative.xcodeproj \
            -scheme Playground \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
