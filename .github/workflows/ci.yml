name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # в”Ђв”Ђ Apple: macOS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  MacOS:
    uses: ./.github/workflows/build-macos.yml

  MacOS_Ninja:
    uses: ./.github/workflows/build-macos.yml
    with:
      generator: 'Ninja Multi-Config'

  MacOS_Sanitizers:
    uses: ./.github/workflows/build-macos.yml
    with:
      enable-sanitizers: true

  # в”Ђв”Ђ Apple: Xcode 26 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  MacOS_Xcode26:
    uses: ./.github/workflows/build-macos.yml
    with:
      xcode-version: '26.4'
      runs-on: macos-26

  iOS_Xcode26:
    uses: ./.github/workflows/build-ios.yml
    with:
      deployment-target: '26.0'
      xcode-version: '26.4'
      runs-on: macos-26

  # в”Ђв”Ђ Win32в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  Win32_x64_D3D11:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64

  Win32_x64_JSI_D3D11:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64
      napi-type: jsi

  Win32_x64_V8_D3D11:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64
      napi-type: V8

  Win32_x64_Hermes_D3D11:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64
      napi-type: Hermes

  Win32_x64_D3D11_Sanitizers:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64
      enable-sanitizers: true

  Win32_x64_D3D12:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64
      graphics-api: D3D12

  Win32_x64_D3D11_PrecompiledShaderTest:
    uses: ./.github/workflows/build-win32-shader.yml

  # в”Ђв”Ђ UWP в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  UWP_x64:
    uses: ./.github/workflows/build-uwp.yml
    with:
      platform: x64

  UWP_arm64:
    uses: ./.github/workflows/build-uwp.yml
    with:
      platform: arm64

  UWP_arm64_JSI:
    uses: ./.github/workflows/build-uwp.yml
    with:
      platform: arm64
      napi-type: jsi

  # в”Ђв”Ђ Ubuntu / Linux в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  Ubuntu_Clang_JSC:
    uses: ./.github/workflows/build-linux.yml
    with:
      cc: clang
      cxx: clang++
      js-engine: JavaScriptCore

  Ubuntu_Clang_Hermes:
    uses: ./.github/workflows/build-linux.yml
    with:
      cc: clang
      cxx: clang++
      js-engine: Hermes

  Ubuntu_GCC_JSC:
    uses: ./.github/workflows/build-linux.yml
    with:
      cc: gcc
      cxx: g++
      js-engine: JavaScriptCore

  # в”Ђв”Ђ Android в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  Android_Ubuntu_JSC:
    uses: ./.github/workflows/build-android.yml
    with:
      runs-on: ubuntu-latest
      js-engine: JavaScriptCore

  Android_Ubuntu_V8:
    uses: ./.github/workflows/build-android.yml
    with:
      runs-on: ubuntu-latest
      js-engine: V8

  Android_Ubuntu_Hermes:
    uses: ./.github/workflows/build-android.yml
    with:
      runs-on: ubuntu-latest
      js-engine: Hermes

  Android_MacOS_JSC:
    uses: ./.github/workflows/build-android.yml
    with:
      runs-on: macos-latest
      js-engine: JavaScriptCore

  Android_MacOS_V8:
    uses: ./.github/workflows/build-android.yml
    with:
      runs-on: macos-latest
      js-engine: V8

  # в”Ђв”Ђ Installation Tests в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  iOS_Installation:
    uses: ./.github/workflows/test-install-ios.yml
    with:
      deployment-target: '17.2'

  Linux_Installation:
    uses: ./.github/workflows/test-install-linux.yml

  MacOS_Installation:
    uses: ./.github/workflows/test-install-macos.yml

  Win32_Installation:
    uses: ./.github/workflows/test-install-win32.yml
