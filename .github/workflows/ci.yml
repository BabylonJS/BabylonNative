name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # TEMP: Linux-JSC-only while validating LIBGL_ALWAYS_SOFTWARE / GALLIUM_DRIVER fix.
  # Restore from master before merging anywhere.
  Ubuntu_Clang_JSC:
    uses: ./.github/workflows/build-linux.yml
    with:
      cc: clang
      cxx: clang++
      js-engine: JavaScriptCore

  Ubuntu_GCC_JSC:
    uses: ./.github/workflows/build-linux.yml
    with:
      cc: gcc
      cxx: g++
      js-engine: JavaScriptCore