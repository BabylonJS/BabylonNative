name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Ubuntu / Linux ────────────────────────────────────────────
  # NOTE: temporary for unittest-watchdog branch only — every other
  # CI job has been disabled so we burn fewer Actions minutes while
  # characterizing Linux JSC runner-variance / Materials slowness.
  # Restore from ci.yml on master before merging anywhere.
  Ubuntu_Clang_JSC:
    uses: ./.github/workflows/build-linux.yml
    with:
      cc: clang
      cxx: clang++
      js-engine: JavaScriptCore

  Ubuntu_GCC_JSC:
    uses: ./.github/workflows/build-linux.yml
    with:
      cc: gcc
      cxx: g++
      js-engine: JavaScriptCore
