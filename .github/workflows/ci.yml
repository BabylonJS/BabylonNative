name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Apple: macOS ──────────────────────────────────────────────
  MacOS:
    uses: ./.github/workflows/build-macos.yml
    with:
      xcode-version: "26.4"
      runs-on: macos-26
      # Default macOS build publishes the Playground.app (binary + Scripts +
      # ReferenceImages) as an artifact consumed by MacOS_VisualizationTests.
      upload-visualization-artifact: true

  MacOS_Ninja:
    uses: ./.github/workflows/build-macos.yml
    with:
      generator: "Ninja Multi-Config"
      xcode-version: "26.4"
      runs-on: macos-26

  MacOS_Sanitizers:
    uses: ./.github/workflows/build-macos.yml
    with:
      enable-sanitizers: true
      xcode-version: "26.4"
      runs-on: macos-26

  # ── Apple: Xcode 26 ──────────────────────────────────────────
  MacOS_Xcode26:
    uses: ./.github/workflows/build-macos.yml
    with:
      xcode-version: "26.4"
      runs-on: macos-26

  # ── Visualization Tests (custom / self-hosted agents only) ────
  # Runs the Playground pixel-diff validation suite against a real Metal GPU.
  # Downloads the Playground.app artifact built by the default MacOS job so no
  # rebuild is needed on the custom agent.
  MacOS_VisualizationTests:
    needs: MacOS
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Download visualization test artifact
        uses: actions/download-artifact@v6
        with:
          name: macos-visualization-tests

      - name: Extract Playground.app
        run: tar -xzf playground-macos-visualization-tests.tar.gz

      - name: Run visualization tests
        run: ./Playground.app/Contents/MacOS/Playground app:///Scripts/validation_native.js

      - name: Upload visualization test results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: macos-visualization-test-results
          path: |
            Results
            Errors
          if-no-files-found: ignore

