parameters:
  name: ""
  vmImage: ""
  enableSanitizers: false
  generator: Xcode

jobs:
  - job: ${{parameters.name}}
    timeoutInMinutes: 30
    pool:
      vmImage: ${{parameters.vmImage}}

    variables:
      SANITIZER_FLAG: ${{coalesce(replace(format('{0}', parameters.enableSanitizers), 'True', 'ON'), 'OFF')}}

    steps:
      - template: cmake.yml
        parameters:
          vmImage: ${{parameters.vmImage}}

      - script: |
          sudo xcode-select --switch /Applications/Xcode_$(XCODE_VERSION).app/Contents/Developer
        displayName: "Select XCode $(XCODE_VERSION)"

      - script: |
          cmake -G "${{parameters.generator}}" -B build/macOS -D CMAKE_UNITY_BUILD=$(UNITY_BUILD) -D BABYLON_DEBUG_TRACE=ON -D ENABLE_SANITIZERS=$(SANITIZER_FLAG) -D BABYLON_NATIVE_TESTS_USE_NOOP_METAL_DEVICE=ON
        displayName: "Generate macOS solution"

      - script: |
          cmake --build build/macOS --target Playground --config RelWithDebInfo
        displayName: "Build Playground macOS"

      - script: |
          cmake --build build/macOS --target UnitTests --config RelWithDebInfo
        displayName: "Build UnitTests macOS"

      - script: |
          sudo sysctl -w kern.corefile=core.%P
        displayName: "Enable Core Dumps"

      - script: |
          cd build/macOS/Apps/UnitTests/RelWithDebInfo
          ulimit -c unlimited
          ./UnitTests
        displayName: "Run UnitTests macOS"

      - bash: |
          if ls ~/Library/Logs/DiagnosticReports/UnitTests* 1>/dev/null 2>&1; then
            mkdir -p $(Build.ArtifactStagingDirectory)/Dumps
            cp ~/Library/Logs/DiagnosticReports/UnitTests* $(Build.ArtifactStagingDirectory)/Dumps/
          fi
        displayName: "Stage macOS crash logs"
        condition: failed()

      - task: PublishBuildArtifacts@1
        inputs:
          artifactName: "${{parameters.name}} Crash Dumps"
          pathtoPublish: "$(Build.ArtifactStagingDirectory)/Dumps"
        displayName: "Publish ${{parameters.name}} Crash Dumps"
        condition: failed()
