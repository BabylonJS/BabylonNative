parameters:
  - name: name
    type: string
  - name: vmImage
    type: string
  - name: platform
    type: string
    default: x64

jobs:
  - job: ${{parameters.name}}
    timeoutInMinutes: 30
    pool:
      vmImage: ${{parameters.vmImage}}
    variables:
      solutionName: "Win32_${{parameters.platform}}_PrecompiledShaderTest"

    steps:
      - template: cmake.yml
        parameters:
          vmImage: ${{parameters.vmImage}}

      - script: |
          cmake -G "Visual Studio 17 2022" -B build/${{variables.solutionName}} -A ${{parameters.platform}} -D BX_CONFIG_DEBUG=ON -D GRAPHICS_API=D3D11 -D CMAKE_UNITY_BUILD=$(UNITY_BUILD) -D BGFX_CONFIG_MAX_FRAME_BUFFERS=256 -D BABYLON_DEBUG_TRACE=ON -D BABYLON_NATIVE_PLUGIN_NATIVEENGINE_COMPILESHADERS=OFF
        displayName: "Generate ${{variables.solutionName}} solution"

      - script: |
          cmake --build build/${{variables.solutionName}} --config RelWithDebInfo --target PrecompiledShaderTest -- /m
        displayName: "Build PrecompiledShaderTest"

      - script: |
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps\PrecompiledShaderTest.exe" /f
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps\PrecompiledShaderTest.exe" /v DumpType /t REG_DWORD /d 2 /f
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps\PrecompiledShaderTest.exe" /v DumpCount /t REG_DWORD /d 1 /f
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps\PrecompiledShaderTest.exe" /v DumpFolder /t REG_SZ /d "$(Build.ArtifactStagingDirectory)/Dumps" /f
        displayName: "Enable Crash Dump"

      - script: |
          cd build\${{variables.solutionName}}\Apps\PrecompiledShaderTest\RelWithDebInfo
          PrecompiledShaderTest
        displayName: "Precompiled Shader Test"

      - task: CopyFiles@2
        inputs:
          sourceFolder: "build/${{variables.solutionName}}/Apps/PrecompiledShaderTest/RelWithDebInfo"
          contents: PrecompiledShaderTest.*
          targetFolder: "$(Build.ArtifactStagingDirectory)/Dumps"
          cleanTargetFolder: false
        displayName: "Stage Crash Dump"
        condition: failed()

      - task: PublishBuildArtifacts@1
        inputs:
          artifactName: "${{variables.solutionName}} - Crash Dumps"
          pathtoPublish: "$(Build.ArtifactStagingDirectory)/Dumps"
        displayName: "Publish Crash Dumps"
        condition: failed()
